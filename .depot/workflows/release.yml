name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.23) — select the tag ref in the Depot dashboard'
        required: false

jobs:
  # Build and publish CLI binaries for all platforms using GoReleaser
  release-cli:
    runs-on: depot-ubuntu-24.04-8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}

  # NOTE: macOS DMG must be built locally and uploaded manually.
  # Depot CI has no macOS runners — macos-latest silently runs on Linux,
  # which cannot load macOS native modules (iconv-corefoundation, etc).
  # Build locally: cd apps/desktop && node scripts/package.mjs --mac --arm64
  # Upload: gh release upload <tag> dist/forge-desktop-*.dmg --repo shivasymbl/forge
