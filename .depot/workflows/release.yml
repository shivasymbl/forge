name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Build and publish CLI binaries for all platforms using GoReleaser
  release-cli:
    runs-on: depot-ubuntu-24.04-8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and upload signed macOS desktop DMG (requires Apple certs)
  release-desktop-mac:
    runs-on: macos-latest
    needs: release-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Forge Desktop (macOS arm64)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.APPLE_ID != '' && 'true' || 'false' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ~/.cache/electron
        run: node scripts/package.mjs --mac --arm64

      - name: Upload desktop DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload $TAG apps/desktop/dist/forge-desktop-*.dmg \
            --repo shivasymbl/forge --clobber
