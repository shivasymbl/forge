version: 2

project_name: forge

builds:
  - id: multica
    main: ./cmd/multica
    dir: server
    binary: forge
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Legacy archive name kept so already-released CLIs (whose `multica update`
  # looks for `multica_{os}_{arch}.{ext}`) can keep self-updating. Remove
  # once those versions are no longer in use.
  - id: legacy
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # Versioned archive — forge-cli-{version}-{os}-{arch}.tar.gz
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

  # Version-less "latest" archive — forge-cli-{os}-{arch}.tar.gz
  # Powers: /releases/latest/download/forge-cli-linux-amd64.tar.gz
  # Used by: install.sh, `forge update`, remote machine setup scripts
  - id: latest
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

